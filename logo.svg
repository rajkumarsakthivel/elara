<svg width="48" height="48" viewBox="0 0 48 48" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!--
    Elara mark — "Astral Codex" edition
    Concept: Astronomical instrument sight glass.
    A precision ring (orbital path) encircles a 4-pointed compass-rose star.
    Cardinal tick marks bridge ring to star tips.
    Elara (moon of Jupiter) rests on the ring at NE position.
  -->

  <!-- Orbital ring -->
  <circle cx="24" cy="24" r="20" stroke="#C9A84C" stroke-width="0.85"/>

  <!-- 4-pointed compass-rose star
       Outer tips (r=15): top (24,9), right (39,24), bottom (24,39), left (9,24)
       Inner corners (r=3.5, at 45° between tips):
         NE (26.5,21.5)  SE (26.5,26.5)  SW (21.5,26.5)  NW (21.5,21.5)
  -->
  <path
    d="M24,9 L26.5,21.5 L39,24 L26.5,26.5 L24,39 L21.5,26.5 L9,24 L21.5,21.5 Z"
    fill="#C9A84C"
  />

  <!-- Cardinal ticks — ring (r=20) to star tips (r=15) -->
  <line x1="24" y1="4"  x2="24" y2="9"  stroke="#C9A84C" stroke-width="0.85"/>
  <line x1="44" y1="24" x2="39" y2="24" stroke="#C9A84C" stroke-width="0.85"/>
  <line x1="24" y1="44" x2="24" y2="39" stroke="#C9A84C" stroke-width="0.85"/>
  <line x1="4"  y1="24" x2="9"  y2="24" stroke="#C9A84C" stroke-width="0.85"/>

  <!-- Elara — moon of Jupiter, sitting on the orbital ring at NE (45° from north)
       Position: (24 + 20·sin45°, 24 − 20·cos45°) = (38.14, 9.86)
  -->
  <circle cx="38.1" cy="9.9" r="3.8" fill="#C9A84C"/>
  <!-- Subtle inner shadow to give the moon a spherical feel -->
  <circle cx="37.2" cy="9.2" r="1.6" fill="#E8C878" opacity="0.5"/>
</svg>
